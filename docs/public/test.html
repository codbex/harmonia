<!doctype html>
<html lang="en" class="h-screen">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>

    <script defer src="/harmonia/lib/node_modules/alpinejs/dist/cdn.min.js"></script>
    <script src="/harmonia/lib/node_modules/lucide/dist/umd/lucide.min.js"></script>
    <script src="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.js"></script>
    <link href="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.css" rel="stylesheet" />
    <link href="/harmonia/fonts.css" rel="stylesheet" />
  </head>
  <body class="size-full" x-data="app">
    <section x-h-notification-overlay>
      <template id="basic">
        <li x-h-notification.floating class="hbox">
          <div x-h-notification-media>
            <i role="img" data-lucide="chevron-left"></i>
          </div>
          <div class="vbox">
            <h1 x-h-notification-title x-text="title"></h1>
            <p x-h-notification-description x-text="message"></p>
          </div>
        </li>
      </template>
    </section>

    <div class="grid size-full grid-cols-3 place-content-center gap-4">
      <button x-h-button @click="notify('top-left')">Top Left</button>
      <button x-h-button @click="notify('top-center')">Top Center</button>
      <button x-h-button @click="notify('top-right')">Top Right</button>
      <button x-h-button @click="notify('bottom-left')">Bottom Left</button>
      <button x-h-button @click="notify('bottom-center')">Bottom Center</button>
      <button x-h-button @click="notify('bottom-right')">Bottom Right</button>
    </div>
    <button x-h-button @click="update()">Click</button>
    <!-- <button x-h-button @click="unnotify()">Unnotify</button> -->
    <script>
      lucide.createIcons({ inTemplates: true });
      document.addEventListener("alpine:init", () => {
        Alpine.data("app", () => ({
          update() {
            this.$notifications.update({
              id: "ops",
              data: {
                progress: 80,
              },
            });
          },
          notify(pos) {
            this.$notifications.add({
              id: "ops",
              template: "basic",
              position: pos,
              data: {
                title: "Test2",
                message: pos,
                progress: 20,
              },
              timeout: 0,
            });
          },
          unnotify() {
            this.$notifications.remove("t1");
          },
          init() {
            const lisRef = this.$notifications.addListener({
              added(item) {
                console.log(item);
              },
              updated(id, data) {
                console.log(id, data);
              },
              removed(id) {
                console.log(id);
              },
            });
          },
        }));
      });
    </script>
  </body>
</html>
