<!doctype html>
<html lang="en" class="h-screen">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/harmonia/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Generator | Harmonia</title>

    <script defer src="/harmonia/js/color-convert.js" type="module"></script>
    <script defer src="/harmonia/lib/node_modules/alpinejs/dist/cdn.min.js"></script>
    <script src="/harmonia/lib/node_modules/lucide/dist/umd/lucide.min.js"></script>
    <script src="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.min.js"></script>
    <script src="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia-lucide.min.js"></script>
    <link href="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.css" rel="stylesheet" title="harmonia" />
    <link href="/harmonia/fonts.css" rel="stylesheet" />
    <style id="importStyles" type="text/css"></style>
  </head>
  <body class="hbox h-full" x-data="breakpointController" x-ref="bpCtrl">
    <div x-h-sheet-overlay="showSidebar">
      <div x-h-sheet data-align="left" x-ref="sidebarSheet"></div>
    </div>
    <div x-h-sheet-overlay="showVars">
      <div x-h-sheet data-align="right" x-ref="varsSheet"></div>
    </div>

    <div x-data="mainController" class="hbox flex-1">
      <div x-h-sidebar x-ref="sidebar" style="order: 1">
        <div x-h-sidebar-header>
          <button x-h-sidebar-menu-button x-h-menu-trigger.dropdown.chevron>
            <svg x-h-icon class="size-5" data-link="/harmonia/logo/harmonia-circle.svg" role="presentation"></svg>
            <span>Harmonia</span>
            <svg x-h-lucide role="presentation" data-lucide="chevron-down"></svg>
          </button>
          <ul x-h-menu aria-label="dropdown" data-align="top-end">
            <li x-h-menu-item @click="showAbout = true"><svg x-h-lucide role="presentation" data-lucide="info"></svg>About</li>
          </ul>
        </div>

        <div x-h-sidebar-content>
          <div x-h-sidebar-group>
            <div x-h-sidebar-group-label>Previews</div>
            <div x-h-sidebar-group-content>
              <ul x-h-sidebar-menu>
                <template x-for="previewSection in previewSections" :key="previewSection.value">
                  <li x-h-sidebar-menu-item>
                    <button type="button" x-h-sidebar-menu-button :data-active="active.value === previewSection.value" @click="changeActive(previewSection)" x-text="previewSection.label"></button>
                  </li>
                </template>
              </ul>
            </div>
          </div>
          <div x-h-sidebar-group>
            <div x-h-sidebar-group-label>Layouts</div>
            <div x-h-sidebar-group-content>
              <ul x-h-sidebar-menu>
                <template x-for="layoutSection in layoutSections" :key="layoutSection.value">
                  <li x-h-sidebar-menu-item>
                    <button type="button" x-h-sidebar-menu-button :data-active="active.value === layoutSection.value" @click="changeActive(layoutSection)" x-text="layoutSection.label"></button>
                  </li>
                </template>
              </ul>
            </div>
          </div>
          <div x-h-sidebar-group>
            <div x-h-sidebar-group-label>Charts</div>
            <div x-h-sidebar-group-content>
              <ul x-h-sidebar-menu>
                <template x-for="chartSection in chartSections" :key="chartSection.value">
                  <li x-h-sidebar-menu-item>
                    <button type="button" x-h-sidebar-menu-button :data-active="active.value === chartSection.value" @click="changeActive(chartSection)" x-text="chartSection.label"></button>
                  </li>
                </template>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="vbox flex-1" style="order: 2">
        <div x-h-toolbar>
          <button x-show="isNarrow" x-h-button data-variant="transparent" data-size="icon" aria-label="sidebar sheet open button" @click="showSidebar = true">
            <svg x-h-lucide role="presentation" data-lucide="menu"></svg>
          </button>
          <span x-h-toolbar-title :class="!isNarrow && 'pl-2'" x-text="active.label"></span>
          <div x-h-toolbar-spacer></div>
          <div x-show="isNarrow" x-h-toolbar-separator></div>
          <button x-show="isNarrow" x-h-button data-variant="transparent" data-size="icon" aria-label="variables sheet open button" @click="showVars = true">
            <svg x-h-lucide role="presentation" data-lucide="panel-right-open"></svg>
          </button>
        </div>

        <template x-for="previewSection in previewSections" :key="previewSection.value">
          <div class="h-full overflow-scroll p-4" x-h-include="`/harmonia/theming/fragments/${previewSection.value}.html`" :data-js="previewSection.scripts" x-show="active.value === previewSection.value"></div>
        </template>

        <template x-for="layoutSection in layoutSections" :key="layoutSection.value">
          <div class="h-full overflow-scroll p-4" x-h-include="`/harmonia/theming/fragments/${layoutSection.value}.html`" :data-js="layoutSection.scripts" x-show="active.value === layoutSection.value"></div>
        </template>

        <template x-for="chartSection in chartSections" :key="chartSection.value">
          <div class="h-full overflow-scroll p-4" x-h-include="`/harmonia/theming/fragments/${chartSection.value}.html`" x-show="active.value === chartSection.value"></div>
        </template>
      </div>

      <div x-h-dialog-overlay :data-open="showAbout">
        <div x-h-dialog>
          <div x-h-dialog-header>
            <h2 x-h-dialog-title>Harmonia</h2>
            <button x-h-dialog-close aria-label="about button" @click="showAbout = false">
              <svg x-h-icon data-icon="close" role="presentation"></svg>
            </button>
            <p x-h-dialog-description x-text="getVersion()"></p>
          </div>
          <div>
            <p>Harmonia is an <a href="https://alpinejs.dev/">Alpine.js</a> component library made by <a href="https://www.codbex.com/">codbex</a>.</p>
            <p>This page is both a demo page and a theme generator.</p>
          </div>
          <div x-h-dialog-footer>
            <button x-h-button data-variant="outline" @click="showAbout = false">Close</button>
            <button x-h-button data-variant="primary" @click="showAbout = false">OK</button>
          </div>
        </div>
      </div>
    </div>

    <div x-data="themeController" class="vbox h-full border-l" :style="{ width: isNarrow ? '19rem' : '21rem' }">
      <div x-h-toolbar>
        <button x-h-button data-variant="transparent" x-h-menu-trigger.dropdown>
          <!-- svg placeholders on purpose: x-h-lucide renders them in place,
               so the x-show bindings keep switching the visible icon. -->
          <svg x-h-lucide x-show="mode === 'auto'" role="presentation" data-lucide="sun-moon"></svg>
          <span x-show="mode === 'auto'">Auto</span>
          <svg x-h-lucide x-show="mode === 'light'" role="presentation" data-lucide="sun"></svg>
          <span x-show="mode === 'light'">Light</span>
          <svg x-h-lucide x-show="mode === 'dark'" role="presentation" data-lucide="moon"></svg>
          <span x-show="mode === 'dark'">Dark</span>
        </button>
        <ul x-h-menu>
          <li x-h-menu-item @click="themeChange('auto')"><svg x-h-lucide role="presentation" data-lucide="sun-moon"></svg>Auto</li>
          <li x-h-menu-item @click="themeChange('light')"><svg x-h-lucide role="presentation" data-lucide="sun"></svg>Light</li>
          <li x-h-menu-item @click="themeChange('dark')"><svg x-h-lucide role="presentation" data-lucide="moon"></svg>Dark</li>
        </ul>
        <div x-h-toolbar-spacer></div>
        <button x-h-button data-variant="transparent" @click="showImportDialog()"><svg x-h-lucide role="presentation" data-lucide="upload"></svg>Import</button>
        <div x-h-toolbar-separator></div>
        <button x-h-button data-variant="transparent" @click="exportTheme()"><svg x-h-lucide role="presentation" data-lucide="download"></svg>Export</button>
      </div>
      <div class="relative flex-1">
        <div x-h-exp-panel data-size="md">
          <div x-h-exp-panel-item="true">
            <h3 x-h-exp-panel-trigger="'Colors'"></h3>
            <div x-h-exp-panel-content>
              <div class="vbox gap-3 p-3" x-show="mode !== 'dark'">
                <template x-for="color in colors.light">
                  <div x-h-field>
                    <label x-h-label :for="color.name" x-text="color.name"></label>
                    <div class="hbox gap-2">
                      <input class="aspect-square w-auto!" :id="color.name + 'Select'" :aria-label="'Select ' + color.name + ' color'" x-h-input type="color" :value="getHexColor(color.value)" @change="applyColSelect(event, color.varId)" />
                      <input x-h-input :id="color.name" @input="applyVar(event, color.varId, true)" x-model="color.value" x-bind:data-col="color.value" />
                    </div>
                  </div>
                </template>
              </div>
              <div class="vbox gap-3 p-3" x-show="mode === 'dark'">
                <template x-for="color in colors.dark">
                  <div x-h-field>
                    <label x-h-label :for="color.name + 'Dark'" x-text="color.name"></label>
                    <div class="hbox gap-2">
                      <input
                        class="aspect-square w-auto!"
                        :id="color.name + 'SelectDark'"
                        :aria-label="'Select ' + color.name + ' color'"
                        x-h-input
                        type="color"
                        :value="getHexColor(color.value)"
                        @change="applyColSelect(event, color.varId)"
                      />
                      <input x-h-input :id="color.name + 'Dark'" @input="applyVar(event, color.varId, true)" x-model="color.value" />
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <div x-h-exp-panel-item>
            <h3 x-h-exp-panel-trigger="'Shadows'"></h3>
            <div x-h-exp-panel-content>
              <div class="vbox gap-3 p-3" x-show="mode !== 'dark'">
                <template x-for="shadow in shadows.light">
                  <div x-h-field>
                    <label x-h-label :for="shadow.name" x-text="shadow.name"></label>
                    <input x-h-input :id="shadow.name" x-model="shadow.value" @input="applyVar(event, shadow.varId, false)" />
                  </div>
                </template>
              </div>
              <div class="vbox gap-3 p-3" x-show="mode === 'dark'">
                <template x-for="shadow in shadows.dark">
                  <div x-h-field>
                    <label x-h-label :for="shadow.name + 'Dark'" x-text="shadow.name"></label>
                    <input x-h-input :id="shadow.name + 'Dark'" x-model="shadow.value" @input="applyVar(event, shadow.varId, false)" />
                  </div>
                </template>
              </div>
            </div>
          </div>

          <div x-h-exp-panel-item>
            <h3 x-h-exp-panel-trigger="'Fonts'"></h3>
            <div x-h-exp-panel-content>
              <div class="vbox gap-3 p-3" x-show="mode !== 'dark'">
                <template x-for="font in fonts.light">
                  <div x-h-field>
                    <label x-h-label :for="font.name" x-text="font.name"></label>
                    <input x-h-input :id="font.name" x-model="font.value" @input="applyVar(event, font.varId, false)" />
                  </div>
                </template>
              </div>
              <div class="vbox gap-3 p-3" x-show="mode === 'dark'">
                <template x-for="font in fonts.dark">
                  <div x-h-field>
                    <label x-h-label :for="font.name + 'Dark'" x-text="font.name"></label>
                    <input x-h-input :id="font.name + 'Dark'" x-model="font.value" @input="applyVar(event, font.varId, false)" />
                  </div>
                </template>
              </div>
            </div>
          </div>

          <div x-h-exp-panel-item>
            <h3 x-h-exp-panel-trigger="'Others'"></h3>
            <div x-h-exp-panel-content>
              <div class="vbox gap-3 p-3" x-show="mode !== 'dark'">
                <template x-for="other in others.light">
                  <div x-h-field>
                    <label x-h-label :for="other.name" x-text="other.name"></label>
                    <input x-h-input :id="other.name" x-model="other.value" @input="applyVar(event, other.varId, false)" />
                  </div>
                </template>
              </div>
              <div class="vbox gap-3 p-3" x-show="mode === 'dark'">
                <template x-for="other in others.dark">
                  <div x-h-field>
                    <label x-h-label :for="other.name + 'Dark'" x-text="other.name"></label>
                    <input x-h-input :id="other.name + 'Dark'" x-model="other.value" @input="applyVar(event, other.varId, false)" />
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div x-h-dialog-overlay :data-open="showExport">
        <div class="h-1/2" x-h-dialog>
          <div x-h-dialog-header>
            <h2 x-h-dialog-title>Theme CSS Variables</h2>
            <button x-h-dialog-close aria-label="close button" @click="showExport = false">
              <svg x-h-icon data-icon="close" role="presentation"></svg>
            </button>
          </div>
          <p class="overflow-scroll" x-h-text.code x-text="themeStylesheet"></p>
          <div x-h-dialog-footer>
            <button x-h-button data-variant="primary" @click="copy($refs.copyBtn)"><svg x-h-lucide role="presentation" data-lucide="copy"></svg><span x-ref="copyBtn">Copy</span></button>
          </div>
        </div>
      </div>

      <div x-h-dialog-overlay :data-open="showImport">
        <div class="h-1/2" x-h-dialog>
          <div x-h-dialog-header>
            <h2 x-h-dialog-title>Import CSS Variables</h2>
            <button x-h-dialog-close aria-label="close button" @click="showImport = false">
              <svg x-h-icon data-icon="close" role="presentation"></svg>
            </button>
            <p x-h-dialog-description>This will override the existing theme!</p>
          </div>
          <textarea id="importCssVars" class="h-full" x-h-textarea :placeholder="importPlaceholder" x-ref="themeCssInput"></textarea>
          <div x-h-dialog-footer>
            <button x-h-button data-variant="primary" @click="importTheme($refs)">Import</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("breakpointController", () => ({
          isNarrow: false,
          showSidebar: false,
          showVars: false,
          sidebarBreakpointListener: undefined,
          varsBreakpointListener: undefined,
          // Populated from sections.json, which scripts/generate-theming-fragments.cjs
          // writes alongside the fragments (labels, values, and scripts flags).
          previewSections: [],
          layoutSections: [],
          chartSections: [],
          active: {},
          changeActive(previewSection) {
            this.active = previewSection;
          },
          async init() {
            try {
              const response = await fetch("/harmonia/theming/sections.json");
              if (!response.ok) throw new Error(`HTTP ${response.status}`);
              const sections = await response.json();
              this.previewSections = sections.previewSections;
              this.layoutSections = sections.layoutSections;
              this.chartSections = sections.chartSections;
              this.active = this.previewSections[0];
            } catch (error) {
              console.error("Failed to load theming sections:", error);
            }
          },
        }));
        Alpine.data("mainController", () => ({
          years: (() => {
            let year = new Date().getFullYear();
            let allYears = [];
            for (let y = 0; y <= 10; y++) allYears.push(year + y);
            return allYears;
          })(),
          caldate: (() => {
            let date = new Date();
            if (date.getDate() === 1) {
              date.setDate(date.getDate() + 1);
            } else {
              date.setDate(date.getDate() - 1);
            }
            return date.toISOString();
          })(),
          showAbout: false,
          getVersion() {
            return `Version ${Harmonia.version}`;
          },
          init() {
            this.sidebarBreakpointListener = Harmonia.getBreakpointListener((matches) => {
              if (matches) {
                this.$refs.sidebarSheet.appendChild(this.$refs.sidebar);
              } else if (this.$refs.sidebarSheet.firstElementChild) {
                this.showSidebar = false;
                this.$el.appendChild(this.$refs.sidebar);
              }
              this.isNarrow = matches;
            }, 1184);
          },
        }));

        Alpine.data("themeController", () => ({
          mode: Harmonia.getColorScheme(),
          themeChange(mode) {
            this.mode = mode;
            Harmonia.setColorScheme(this.mode);
          },
          showExport: false,
          showImport: false,
          convertColor(value, input) {
            if (value && !value.startsWith("var")) {
              const hex = ColorConvert.formatHex(value);
              if (hex) {
                window[input].value = hex;
              }
            }
          },
          colorVars: [
            "--background",
            "--foreground",
            "--card",
            "--card-foreground",
            "--popover",
            "--popover-foreground",
            "--primary",
            "--primary-foreground",
            "--primary-hover",
            "--primary-active",
            "--secondary",
            "--secondary-foreground",
            "--secondary-hover",
            "--secondary-active",
            "--muted",
            "--muted-foreground",
            "--split-handle",
            "--border",
            "--input-border",
            "--input-background",
            "--ring",
            "--negative",
            "--negative-foreground",
            "--negative-hover",
            "--negative-active",
            "--positive",
            "--positive-foreground",
            "--positive-hover",
            "--positive-active",
            "--warning",
            "--warning-foreground",
            "--warning-hover",
            "--warning-active",
            "--information",
            "--information-foreground",
            "--information-hover",
            "--information-active",
            "--sidebar",
            "--sidebar-foreground",
            "--sidebar-primary",
            "--sidebar-primary-foreground",
            "--sidebar-secondary",
            "--sidebar-secondary-foreground",
            "--sidebar-border",
            "--object-header",
            "--object-header-foreground",
            "--table-header",
            "--table-header-foreground",
            "--table-hover",
            "--table-hover-foreground",
            "--table-active",
            "--table-active-foreground",
          ],
          shadowVars: ["--shadow-xs", "--shadow-sm", "--shadow-md", "--shadow-lg", "--shadow-xl", "--shadow-button", "--shadow-input"],
          fontVars: ["--font-sans", "--font-serif", "--font-mono", "--tracking-normal"],
          othersVars: ["--radius-control", "--radius", "--spacing", "--opacity-disabled"],
          getVarLabel(name) {
            return name
              .replace("--", " ")
              .replace("-", " ")
              .replace(/\b\w/g, (l) => {
                return l.toUpperCase();
              });
          },
          getHexColor(color) {
            if (color.startsWith("var(")) {
              const colorName = color.replace("var(", "").replace(")", "");
              if (this.mode === "dark") {
                for (let c = 0; c < this.colors.dark.length; c++) {
                  if (this.colors.dark[c].name === colorName) return ColorConvert.formatHex(this.colors.dark[c].value);
                }
              }
            } else return ColorConvert.formatHex(color);
          },
          applyColSelect(event, varId) {
            event.target.nextElementSibling.value = event.target.value;
            event.target.nextElementSibling.dispatchEvent(new Event("input", { bubbles: true }));
          },
          applyVar(event, varId, isColor) {
            if (isColor && !event.target.value.startsWith("var(")) {
              try {
                ColorConvert.parse(event.target.value);
              } catch (error) {
                event.target.setCustomValidity("Unknown color format");
                return;
              }
              event.target.setCustomValidity("");
            }
            document.documentElement.style.setProperty(varId, event.target.value);
          },
          colors: {
            light: [],
            dark: [],
          },
          shadows: {
            light: [],
            dark: [],
          },
          fonts: {
            light: [],
            dark: [],
          },
          others: {
            light: [],
            dark: [],
          },
          async copy(text) {
            try {
              await navigator.clipboard.writeText(this.themeStylesheet);
              text.innerText = "Copied!";
              setTimeout(() => {
                text.innerText = "Copy";
              }, 1000);
            } catch (error) {
              console.error(error.message);
            }
          },
          themeStylesheet: "",
          importPlaceholder: `:root,\n:host {\n  --background: ...\n}\n\n.dark {\n  --background: ...\n}`,
          showImportDialog() {
            this.showImport = true;
          },
          importTheme(refs) {
            const importStyle = document.getElementById("importStyles");
            importStyle.textContent = refs.themeCssInput.value;
            this.getThemeVars(true);
            this.showImport = false;
          },
          exportTheme() {
            let themeCss = ":root,\n:host {\n";
            for (let c = 0; c < this.colors.light.length; c++) {
              themeCss += `  ${this.colors.light[c].varId}: ${this.colors.light[c].value};\n`;
            }
            for (let c = 0; c < this.shadows.light.length; c++) {
              themeCss += `  ${this.shadows.light[c].varId}: ${this.shadows.light[c].value};\n`;
            }
            for (let c = 0; c < this.fonts.light.length; c++) {
              themeCss += `  ${this.fonts.light[c].varId}: ${this.fonts.light[c].value};\n`;
            }
            for (let c = 0; c < this.others.light.length; c++) {
              themeCss += `  ${this.others.light[c].varId}: ${this.others.light[c].value};\n`;
            }
            themeCss += "}\n\n.dark {\n";
            for (let c = 0; c < this.colors.dark.length; c++) {
              themeCss += `  ${this.colors.dark[c].varId}: ${this.colors.dark[c].value};\n`;
            }
            for (let c = 0; c < this.shadows.dark.length; c++) {
              themeCss += `  ${this.shadows.dark[c].varId}: ${this.shadows.dark[c].value};\n`;
            }
            for (let c = 0; c < this.fonts.dark.length; c++) {
              themeCss += `  ${this.fonts.dark[c].varId}: ${this.fonts.dark[c].value};\n`;
            }
            for (let c = 0; c < this.others.dark.length; c++) {
              themeCss += `  ${this.others.dark[c].varId}: ${this.others.dark[c].value};\n`;
            }
            themeCss += "}";
            this.themeStylesheet = themeCss;
            this.showExport = true;
          },
          getThemeVars(fromImport = false) {
            this.colors.light.length = 0;
            this.colors.dark.length = 0;
            this.shadows.light.length = 0;
            this.shadows.dark.length = 0;
            this.fonts.light.length = 0;
            this.fonts.dark.length = 0;
            this.others.light.length = 0;
            this.others.dark.length = 0;

            let styleSheet;
            if (fromImport) {
              for (let i = 0; i < document.styleSheets.length; i++) {
                if (document.styleSheets[i].ownerNode.id === "importStyles") styleSheet = document.styleSheets[i];
              }
            } else {
              for (let i = 0; i < document.styleSheets.length; i++) {
                if (document.styleSheets[i].title === "harmonia") styleSheet = document.styleSheets[i];
              }
            }

            for (const rule of styleSheet.cssRules) {
              if (rule.selectorText === ":root, :host") {
                for (const name of rule.style) {
                  if (name.startsWith("--")) {
                    if (this.colorVars.includes(name)) {
                      this.colors.light.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    } else if (this.shadowVars.includes(name)) {
                      this.shadows.light.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    } else if (this.fontVars.includes(name)) {
                      this.fonts.light.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    } else {
                      this.others.light.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    }
                  }
                }
              } else if (rule.selectorText === ".dark") {
                for (const name of rule.style) {
                  if (name.startsWith("--")) {
                    if (this.colorVars.includes(name)) {
                      this.colors.dark.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    } else if (this.shadowVars.includes(name)) {
                      this.shadows.dark.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    } else if (this.fontVars.includes(name)) {
                      this.fonts.dark.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    } else {
                      this.others.dark.push({
                        varId: name,
                        name: this.getVarLabel(name),
                        value: rule.style.getPropertyValue(name).trim(),
                      });
                    }
                  }
                }
              }
            }
          },
          init() {
            this.getThemeVars();
            this.varsBreakpointListener = Harmonia.getBreakpointListener((matches) => {
              if (matches) {
                this.$refs.varsSheet.appendChild(this.$el);
              } else if (this.$refs.varsSheet.firstElementChild) {
                this.showVars = false;
                this.$refs.bpCtrl.appendChild(this.$el);
              }
            }, 1184);
          },
        }));
      });
    </script>
  </body>
</html>
