<div class="vbox items-start gap-4" x-data="{ toggled: true }">
  <button x-h-button>Default</button>

  <button x-h-button data-variant="primary">Primary</button>

  <button x-h-button data-variant="positive">Positive</button>

  <button x-h-button data-variant="negative">Negative</button>

  <button x-h-button data-variant="warning">Warning</button>

  <button x-h-button data-variant="information">Information</button>

  <button x-h-button data-variant="outline">Outline</button>

  <button x-h-button data-variant="transparent">Transparent</button>

  <a x-h-button data-variant="link" href="#">Link</a>

  <button x-h-button :data-toggled="toggled" @click="toggled = !toggled">Toggle</button>

  <button x-h-button>
    <i x-h-lucide role="img" data-lucide="chevron-left"></i>
    Left-aligned
  </button>
  <button x-h-button>
    <i x-h-lucide role="img" data-lucide="chevron-right"></i>
    Right-aligned
  </button>
  <button x-h-button>
    <svg x-h-icon.search role="img" aria-label="search"></svg>
    Search
  </button>

  <button x-h-button>
    <span x-h-spinner></span>
    <span>Saving...</span>
  </button>
  <button x-h-button data-variant="primary">
    <span x-h-spinner></span>
    <span>Saving...</span>
  </button>

  <button x-h-button data-size="icon" aria-label="Icon button">
    <i x-h-lucide role="img" data-lucide="save"></i>
  </button>

  <div>
    <button x-h-button data-size="sm">
      <i x-h-lucide role="img" data-lucide="save"></i>
      Save
    </button>

    <button x-h-button data-size="icon-sm" aria-label="Icon button">
      <i x-h-lucide role="img" data-lucide="save"></i>
    </button>
  </div>

  <div>
    <button x-h-button data-size="md">
      <i x-h-lucide role="img" data-lucide="save"></i>
      Save
    </button>
    <button x-h-button data-size="icon-md" aria-label="Icon button">
      <i x-h-lucide role="img" data-lucide="save"></i>
    </button>
  </div>

  <div x-h-button-group>
    <button x-h-button data-variant="outline">Action</button>
    <button x-h-button data-size="icon" data-variant="outline" aria-label="Add button">
      <i x-h-lucide role="img" data-lucide="plus"></i>
    </button>
  </div>
  <div x-h-button-group>
    <button x-h-button>Left</button>
    <div x-h-button-group-separator></div>
    <button x-h-button>Right</button>
  </div>

  <div class="hbox gap-4">
    <div x-h-button-group data-orientation="vertical">
      <button x-h-button data-variant="outline">Top</button>
      <button x-h-button data-variant="outline">Center</button>
      <button x-h-button data-variant="outline">Bottom</button>
    </div>
    <div x-h-button-group data-orientation="vertical">
      <button x-h-button data-size="icon" data-variant="outline" aria-label="Zoom in">
        <i x-h-lucide role="img" data-lucide="zoom-in"></i>
      </button>
      <button x-h-button data-size="icon" data-variant="outline" aria-label="Fit to screen">
        <i x-h-lucide role="img" data-lucide="fullscreen"></i>
      </button>
      <button x-h-button data-size="icon" data-variant="outline" aria-label="Zoom out">
        <i x-h-lucide role="img" data-lucide="zoom-out"></i>
      </button>
    </div>
  </div>
</div>
