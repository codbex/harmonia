<div class="vbox gap-4">
  <div class="hbox gap-3">
    <span x-h-checkbox>
      <input type="checkbox" id="unchecked" />
    </span>
    <label x-h-label for="unchecked">Unchecked</label>
  </div>

  <div class="hbox gap-3">
    <span x-h-checkbox>
      <input type="checkbox" id="checked" checked />
    </span>
    <label x-h-label for="checked">Checked</label>
  </div>

  <div class="hbox gap-3">
    <span x-h-checkbox>
      <input type="checkbox" id="checked" x-ref="inter" x-init="$refs.inter.indeterminate = true" />
    </span>
    <label x-h-label for="checked">Indeterminate</label>
  </div>

  <form class="flex flex-col gap-3">
    <div x-h-field data-orientation="horizontal">
      <span x-h-radio>
        <input type="radio" name="size" id="r_small" value="small" checked />
      </span>
      <label x-h-label for="r_small">Small</label>
    </div>
    <div x-h-field data-orientation="horizontal">
      <span x-h-radio>
        <input type="radio" name="size" id="r_medium" value="medium" />
      </span>
      <label x-h-label for="r_medium">Medium</label>
    </div>
    <div x-h-field data-orientation="horizontal">
      <span x-h-radio>
        <input type="radio" name="size" id="r_large" value="large" />
      </span>
      <label x-h-label for="r_large">Large</label>
    </div>
  </form>
</div>
