<div class="vbox gap-4">
  <p x-h-text.muted>Single selection</p>
  <div
    x-h-slot-picker="config"
    x-data="{
      config: {},
      selected: null,
      init() {
        const today = new Date().toISOString().slice(0, 10);
        this.config = { date: today, start: '09:00', end: '17:00', step: 60 };
      }
    }"
    x-model="selected"
    class="rounded-md"
  ></div>

  <p x-h-text.muted>Multiple selection</p>
  <div
    x-h-slot-picker="config"
    x-data="{
      config: {},
      selected: [],
      init() {
        const today = new Date().toISOString().slice(0, 10);
        this.config = { date: today, start: '08:00', end: '12:00', step: 30, multiple: true };
      }
    }"
    x-model="selected"
    class="rounded-md"
  ></div>
</div>
