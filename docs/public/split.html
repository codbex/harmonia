<!doctype html>
<html lang="en" class="h-screen">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split</title>
    <!-- 
    <script defer src="/harmonia/lib/node_modules/alpinejs/dist/cdn.min.js"></script> -->
    <!-- <script src="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.js"></script> -->
    <link href="/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.css" rel="stylesheet" />
    <link href="/harmonia/fonts.css" rel="stylesheet" />
    <script type="importmap">
      {
        "imports": {
          "alpinejs": "/harmonia/lib/node_modules/alpinejs/dist/module.esm.min.js",
          "@codbex/harmonia": "/harmonia/lib/node_modules/@codbex/harmonia/dist/harmonia.esm.js"
        }
      }
    </script>
  </head>
  <body x-data="app" class="vbox size-full">
    <div x-h-toolbar>
      <button x-h-button data-variant="primary" @click="add()">Add</button>
      <div x-h-toolbar-spacer></div>
      <button x-h-button data-variant="negative" @click="remove()">Remove</button>
    </div>
    <div x-h-split data-orientation="vertical" data-variant="border">
      <template x-for="panel in panels" x-bind:key="panel.id">
        <div x-h-split-panel>
          <div class="overflow-auto" x-text="panel.name"></div>
        </div>
      </template>
    </div>

    <script type="module">
      import Alpine from "alpinejs";
      import registerComponents from "@codbex/harmonia";

      Alpine.data("app", () => ({
        panels: [
          {
            name: "Panel 1",
            id: 1,
          },
          {
            name: "Panel 2",
            id: 2,
          },
        ],
        add() {
          this.panels.push({
            name: `Panel ${this.panels.length + 1}`,
            id: this.panels.length + 1,
          });
        },
        remove() {
          this.panels.pop();
        },
      }));

      registerComponents(Alpine.plugin);

      window.Alpine = Alpine;

      Alpine.start();
    </script>
  </body>
</html>
