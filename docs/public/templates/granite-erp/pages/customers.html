<div x-data="pageCustomers" class="vbox gap-4 p-4">
  <div class="hbox flex-wrap items-center gap-2">
    <div x-h-input-group class="w-full md:w-1/3">
      <input x-h-input.group placeholder="Search customers..." aria-label="Search customers" x-model="search" />
      <div x-h-input-group-addon data-align="inline-start">
        <svg x-h-lucide role="presentation" data-lucide="search"></svg>
      </div>
    </div>
    <div class="hbox flex-1 items-center justify-between gap-2">
      <div x-h-select style="max-width: 12rem">
        <input x-h-select-input aria-label="Filter by segment" placeholder="All segments" x-model="segment" />
        <div x-h-select-content>
          <div x-h-select-option="'All segments'" data-value="all"></div>
          <div x-h-select-option="'Enterprise'" data-value="Enterprise"></div>
          <div x-h-select-option="'Mid-market'" data-value="Mid-market"></div>
          <div x-h-select-option="'Small business'" data-value="Small business"></div>
        </div>
      </div>
      <div class="hbox gap-1">
        <button x-h-button data-variant="outline" data-size="icon" :data-toggled="view === 'grid'" aria-label="Card view" @click="view = 'grid'">
          <svg x-h-lucide role="presentation" data-lucide="layout-grid"></svg>
        </button>
        <button x-h-button data-variant="outline" data-size="icon" :data-toggled="view === 'table'" aria-label="Table view" @click="view = 'table'">
          <svg x-h-lucide role="presentation" data-lucide="rows-3"></svg>
        </button>
      </div>
    </div>
  </div>

  <template x-if="view === 'grid'">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <template x-for="customer in list" :key="customer.id">
        <div x-h-card>
          <div x-h-card-header>
            <div x-h-card-title class="hbox items-center gap-3">
              <div x-h-avatar x-text="customer.initials"></div>
              <div class="vbox min-w-0">
                <span class="truncate" x-text="customer.name"></span>
                <span class="truncate text-sm font-normal text-muted-foreground" x-text="customer.city + ', ' + customer.country"></span>
              </div>
            </div>
            <div x-h-card-action>
              <div x-h-tag x-text="customer.segment"></div>
            </div>
          </div>
          <div x-h-card-content class="vbox gap-1 text-sm">
            <span x-text="customer.contact"></span>
            <span class="text-muted-foreground" x-text="customer.email"></span>
          </div>
          <div x-h-card-footer class="hbox items-center justify-between">
            <div class="vbox">
              <span class="text-sm text-muted-foreground">Lifetime revenue</span>
              <span class="font-medium" x-text="$store.erp.money(customer.revenue)"></span>
            </div>
            <button x-h-button data-variant="outline" data-size="sm" @click="selected = customer">View</button>
          </div>
        </div>
      </template>
    </div>
  </template>

  <template x-if="view === 'table'">
    <div x-h-table-container data-border="true">
      <table x-h-table data-borders="rows">
        <thead x-h-table-header>
          <tr x-h-table-row>
            <th x-h-table-head scope="col">Customer</th>
            <th x-h-table-head scope="col">Segment</th>
            <th x-h-table-head scope="col">Contact</th>
            <th x-h-table-head scope="col">Location</th>
            <th x-h-table-head scope="col" class="text-right">Lifetime revenue</th>
          </tr>
        </thead>
        <tbody x-h-table-body>
          <template x-for="customer in list" :key="customer.id">
            <tr x-h-table-row data-hoverable="true" class="cursor-pointer" @click="selected = customer">
              <td x-h-table-cell>
                <div class="hbox items-center gap-3">
                  <div x-h-avatar x-text="customer.initials"></div>
                  <span class="font-medium" x-text="customer.name"></span>
                </div>
              </td>
              <td x-h-table-cell>
                <div x-h-tag x-text="customer.segment"></div>
              </td>
              <td x-h-table-cell>
                <div class="vbox min-w-0">
                  <span class="truncate" x-text="customer.contact"></span>
                  <span class="truncate text-sm text-muted-foreground" x-text="customer.email"></span>
                </div>
              </td>
              <td x-h-table-cell x-text="customer.city + ', ' + customer.country"></td>
              <td x-h-table-cell class="text-right" x-text="$store.erp.money(customer.revenue)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <template x-if="!list.length">
    <div x-h-info-page class="py-12">
      <div x-h-info-page-header>
        <div x-h-info-page-media.icon>
          <svg x-h-lucide role="presentation" data-lucide="users"></svg>
        </div>
        <div x-h-info-page-title>No customers found</div>
        <div x-h-info-page-description>Try a different search term or segment.</div>
      </div>
    </div>
  </template>

  <!-- Customer detail dialog -->
  <div x-h-dialog-overlay :data-open="!!selected" class="backdrop-blur-xs">
    <div x-h-dialog class="w-2xl" style="max-width: 100%">
      <div x-h-dialog-header>
        <h2 x-h-dialog-title x-text="selected ? selected.name : ''"></h2>
        <p x-h-dialog-description x-text="selected ? selected.segment + ', ' + selected.city + ', ' + selected.country : ''"></p>
        <button x-h-dialog-close aria-label="Close dialog" @click="selected = null">
          <svg x-h-icon data-icon="close" role="presentation"></svg>
        </button>
      </div>
      <template x-if="selected">
        <div class="vbox gap-4">
          <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
            <div class="vbox">
              <span class="text-sm text-muted-foreground">Contact</span>
              <span x-text="selected.contact"></span>
            </div>
            <div class="vbox">
              <span class="text-sm text-muted-foreground">Email</span>
              <span class="truncate" x-text="selected.email"></span>
            </div>
            <div class="vbox">
              <span class="text-sm text-muted-foreground">Lifetime revenue</span>
              <span class="font-medium" x-text="$store.erp.money(selected.revenue)"></span>
            </div>
          </div>
          <div class="vbox gap-2">
            <span class="font-medium">Invoices</span>
            <div x-h-table-container data-border="true">
              <table x-h-table>
                <thead x-h-table-header>
                  <tr x-h-table-row>
                    <th x-h-table-head scope="col">Invoice</th>
                    <th x-h-table-head scope="col">Status</th>
                    <th x-h-table-head scope="col" class="text-right">Amount</th>
                  </tr>
                </thead>
                <tbody x-h-table-body>
                  <template x-for="invoice in invoicesFor(selected.name)" :key="invoice.id">
                    <tr x-h-table-row data-hoverable="true" class="cursor-pointer" @click="openInvoice(invoice.id)">
                      <td x-h-table-cell class="font-medium" x-text="invoice.id"></td>
                      <td x-h-table-cell>
                        <span x-h-badge :data-variant="$store.erp.statusVariant(invoice.status)" x-text="invoice.status"></span>
                      </td>
                      <td x-h-table-cell class="text-right" x-text="$store.erp.money(invoice.amount)"></td>
                    </tr>
                  </template>
                  <template x-if="!invoicesFor(selected.name).length">
                    <tr x-h-table-row>
                      <td x-h-table-cell colspan="3" class="text-center text-muted-foreground">No invoices yet.</td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </template>
      <div x-h-dialog-footer>
        <button x-h-button data-variant="outline" @click="selected = null">Close</button>
        <button x-h-button data-variant="primary" @click="$store.erp.searchSeed = selected.name; selected = null; $router.navigate('/invoices')">Show in invoices</button>
      </div>
    </div>
  </div>
</div>
